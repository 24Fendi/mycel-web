<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYCEL | Jaringan Ekonomi Akar Rumput</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow { text-shadow: 0 0 15px rgba(16, 185, 129, 0.6); }
        body { background-color: #0f172a; scroll-behavior: smooth; }
    </style>
</head>
<body class="text-slate-200">

    <nav class="flex justify-between items-center p-6 max-w-6xl mx-auto">
        <div class="text-2xl font-black text-emerald-400 tracking-tighter glow">MYCEL</div>
        <button class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 px-5 py-2 rounded-full font-bold text-xs transition uppercase tracking-wider">Connect Wallet</button>
    </nav>

    <section class="max-w-4xl mx-auto text-center mt-20 px-6">
        <h1 class="text-5xl md:text-7xl font-extrabold mt-6 leading-tight tracking-tighter">
            Modal Usaha <br/> <span class="text-emerald-400">Tanpa Agunan Fisik.</span>
        </h1>
        <p class="mt-8 text-slate-400 text-lg md:text-xl max-w-2xl mx-auto">
            MYCEL menggunakan AI untuk memverifikasi data transaksi harian Anda menjadi skor kredit yang diakui investor global.
        </p>
        <div class="mt-10">
            <a href="#daftar" class="bg-slate-100 text-slate-900 px-10 py-4 rounded-xl font-bold hover:bg-white transition inline-block">Daftar UMKM Sekarang</a>
        </div>
    </section>

    <section id="daftar" class="max-w-xl mx-auto mt-32 p-8 bg-slate-800/50 rounded-3xl border border-slate-700">
        <h2 class="text-2xl font-bold mb-2">Pusat Data UMKM</h2>
        <p class="text-slate-400 text-sm mb-8">Isi data awal untuk mulai membangun reputasi on-chain Anda.</p>
        
        <form class="space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Nama Usaha</label>
                <input type="text" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 mt-1 focus:border-emerald-400 outline-none" placeholder="Contoh: Warung Berkah">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Rata-rata Omzet Bulanan</label>
                <select class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 mt-1 outline-none">
                    <option> < Rp 5 Juta</option>
                    <option>Rp 5 - 20 Juta</option>
                    <option>> Rp 20 Juta</option>
                </select>
            </div>
            <button type="button" onclick="alert('Data Tersimpan di Local Database (Demo Only)')" class="w-full bg-emerald-600 py-4 rounded-xl font-bold hover:bg-emerald-500 transition">Kirim Data & Bangun Reputasi</button>
        </form>
    </section>

    <footer class="mt-40 py-10 border-t border-slate-800 text-center text-slate-600 text-xs">
        &copy; 2026 MYCEL Protocol. Built on Base L2.
    </footer>

</body>
</html>
